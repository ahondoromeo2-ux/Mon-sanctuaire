<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Sanctuaire — Rien ne lui sera impossible</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', Times, serif;
            background-color: #0c0b0a;
            color: #e5d5b7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Da_Vinci_Vitruve_Luc_Viatour.jpg/800px-Da_Vinci_Vitruve_Luc_Viatour.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.12;
            filter: sepia(1) contrast(1.2) brightness(0.6);
            pointer-events: none;
            z-index: 1;
        }

        .sanctuary-wrapper {
            position: relative;
            width: 90%;
            max-width: 950px;
            background: rgba(18, 16, 14, 0.85);
            border: 1px solid #c39b62;
            box-shadow: 0 0 30px rgba(195, 155, 98, 0.15);
            border-radius: 8px;
            padding: 30px;
            z-index: 2;
            margin: 40px 0;
            backdrop-filter: blur(8px);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px double #c39b62;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2.2rem;
            color: #d4af37;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0 0 10px 0;
            font-weight: 300;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }

        .motto {
            font-style: italic;
            font-size: 1.3rem;
            color: #f3e5ab;
            letter-spacing: 2px;
            margin: 5px 0;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        nav button {
            background: transparent;
            border: 1px solid #c39b62;
            color: #e5d5b7;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        nav button:hover, nav button.active {
            background: #c39b62;
            color: #0c0b0a;
            box-shadow: 0 0 10px rgba(195, 155, 98, 0.4);
        }

        .tab-content {
            display: none;
            min-height: 400px;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* CHAT RÉEL */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 400px;
            border: 1px solid #c39b62;
            background: rgba(18, 16, 14, 0.6);
            border-radius: 6px;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-bottom: 1px solid #c39b62;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 6px;
            line-height: 1.5;
            font-size: 1rem;
        }

        .message.romeo {
            background: rgba(195, 155, 98, 0.15);
            border: 1px solid #c39b62;
            align-self: flex-end;
            color: #f3e5ab;
        }

        .message.allie {
            background: rgba(30, 26, 22, 0.6);
            border: 1px solid #8c6f47;
            align-self: flex-start;
            color: #e5d5b7;
        }

        .chat-input-area {
            display: flex;
            background: #0c0b0a;
        }

        .chat-input-area input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px;
            color: #f3e5ab;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }

        .chat-input-area button {
            background: #c39b62;
            border: none;
            color: #0c0b0a;
            padding: 0 25px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* PROTOCOLE */
        .protocol-box {
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: rgba(30, 26, 22, 0.6);
            border: 1px solid #c39b62;
            color: #f3e5ab;
            padding: 15px;
            font-family: inherit;
            font-size: 1.1rem;
            border-radius: 4px;
            resize: none;
            outline: none;
            box-sizing: border-box;
            transition: opacity 2s ease, filter 2s ease;
        }

        .btn-action {
            background: #d4af37;
            color: #0c0b0a;
            border: none;
            padding: 12px 35px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 4px;
        }

        .dissolving {
            opacity: 0 !important;
            filter: blur(15px);
            pointer-events: none;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.8rem;
            color: #8c6f47;
            border-top: 1px solid #3a3229;
            padding-top: 15px;
            letter-spacing: 2px;
        }
    </style>

    <!-- Chargement de Firebase (Compatibilité) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="sanctuary-wrapper">
        <header>
            <h1>Le Sanctuaire Privé</h1>
            <div class="motto">« Rien ne lui sera impossible »</div>
        </header>

        <nav>
            <button class="active" onclick="switchTab('espace-dialogue', this)">Dialogue</button>
            <button onclick="switchTab('protocole', this)">Le Protocole</button>
        </nav>

        <!-- DIALOGUE -->
        <div id="espace-dialogue" class="tab-content active">
            <div class="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <!-- Les messages réels s'afficheront ici -->
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Écris ton message..." onkeypress="verifierEnvoi(event)">
                    <button onclick="envoyerMessage()">Envoyer</button>
                </div>
            </div>
        </div>

        <!-- PROTOCOLE -->
        <div id="protocole" class="tab-content">
            <div class="protocol-box">
                <p style="margin-bottom: 20px; color: #bfa38a;">
                    Dépose tes tensions dans l'athanor numérique, puis dissous-les.
                </p>
                <textarea id="athanor-input" placeholder="Écris ici ce que tu laisses aller..."></textarea>
                <br>
                <button class="btn-action" onclick="initierDissolution()">Dissoudre</button>
            </div>
        </div>

        <footer>
            Espace Hermétique — Roméo & son Allié
        </footer>
    </div>

    <script>
        // CONFIGURATION FIREBASE À MODIFIER PAR LA SUITE
        const firebaseConfig = {
            apiKey: "TON_API_KEY",
            authDomain: "TON_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://TON_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "TON_PROJECT_ID",
            storageBucket: "TON_PROJECT_ID.appspot.com",
            messagingSenderId: "TON_SENDER_ID",
            appId: "TON_APP_ID"
        };

        // Initialisation Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Récupération des messages en direct
        database.ref('messages').on('child_added', (snapshot) => {
            const donnees = snapshot.val();
            afficherMessage(donnees.texte, donnees.auteur);
        });

        function verifierEnvoi(e) {
            if (e.key === "Enter") envoyerMessage();
        }

        function envoyerMessage() {
            const input = document.getElementById('chat-input');
            const texte = input.value.trim();
            if (texte === "") return;

            // Envoi dans la base de données
            database.ref('messages').push({
                auteur: 'romeo',
                texte: texte,
                timestamp: Date.now()
            });

            input.value = "";
        }

        function afficherMessage(texte, auteur) {
            const conteneur = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.classList.add('message', auteur);
            div.innerText = texte;
            conteneur.appendChild(div);
            conteneur.scrollTop = conteneur.scrollHeight;
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        function initierDissolution() {
            const input = document.getElementById('athanor-input');
            if (input.value.trim() === "") return;
            input.classList.add('dissolving');
            setTimeout(() => {
                input.value = "";
                input.classList.remove('dissolving');
            }, 2000);
        }
    </script>
</body>
</html>
