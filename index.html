<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LOX OS | HERO</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div id="lock-screen">
        <h1>SYSTÈME VERROUILLÉ</h1>
        <input type="password" id="code-input" placeholder="CODE D'ACTIVATION">
        <button onclick="checkCode()">DÉVERROUILLER</button>
    </div>

    <div id="main-app" style="display:none;">
        <aside class="sidebar">
            <div class="profile">Roméo | LOX OS</div>
            <nav>
                <button onclick="show('dashboard')">Dashboard</button>
                <button onclick="show('labo')">Labo Lox</button>
                <button onclick="show('journal')">Journal</button>
                <button onclick="show('bibliotheque')">Bibliothèque</button>
            </nav>
        </aside>
        <main class="content">
            <section id="dashboard"><h1>VUE D'ENSEMBLE</h1><div class="card">Actualités Monde</div></section>
            <section id="labo" style="display:none;"><h1>LABO LOX - ANALYSE</h1></section>
            <section id="journal" style="display:none;"><h1>JOURNAL CRYPTO</h1><textarea id="j-input"></textarea><button onclick="crypt()">CODER</button></section>
            <section id="bibliotheque" style="display:none;"><h1>BIBLIOTHÈQUE</h1></section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
