<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOX OS Dashboard</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <!-- Header -->
    <header style="padding: 20px; font-weight: bold; font-size: 1.2rem;">
        Vue d'ensemble
    </header>

    <!-- Grille principale -->
    <main class="dashboard-grid">
        
        <!-- Widget 1: Graphique / Scanner -->
        <div class="card">
            <div class="card-title">Scanner Optique</div>
            <div id="cam-placeholder" style="height: 150px; background: #edf2f7; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                [Visuel Caméra]
            </div>
            <button class="btn-saas" style="margin-top: 15px; background: var(--accent-teal);" onclick="toggleCamera()">Activer</button>
        </div>

        <!-- Widget 2: Source Mère -->
        <div class="card" style="border-top: 4px solid var(--accent-purple);">
            <div class="card-title">Source Mère</div>
            <p style="font-size: 0.8rem; color: var(--text-muted);">Protocole de lâche prise actif.</p>
            <input type="text" placeholder="Nouvelle note..." style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px;">
            <button class="btn-saas">Enregistrer</button>
        </div>

        <!-- Widget 3: Chat -->
        <div class="card">
            <div class="card-title">Transmission</div>
            <div id="chat-box" style="height: 120px; overflow-y: auto; background: #f8fafc; padding: 10px; border-radius: 8px; font-size: 0.85rem;">
                <!-- Messages -->
            </div>
        </div>

    </main>

    <!-- Navigation -->
    <nav class="nav-bottom">
        <button onclick="switchTab('home')">🏠</button>
        <button onclick="switchTab('source')">📊</button>
        <button onclick="switchTab('chat')">💬</button>
    </nav>

    <script src="js/app.js"></script>
</body>
</html>
