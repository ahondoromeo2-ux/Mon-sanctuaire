<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/main.css">
    <title>LOX OS Dashboard</title>
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="profile">
                <div class="avatar"></div>
                <h3>Roméo</h3>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active">Tableau de bord</button>
                <button class="nav-btn">Archive</button>
                <button class="nav-btn">Documents</button>
            </nav>
        </aside>

        <main class="content">
            <header class="top-bar">
                <h2>Vue d'ensemble</h2>
            </header>
            
            <section class="dashboard-grid">
                <!-- Widget 1: Graphique Circulaire -->
                <div class="card card-pie">
                    <div class="card-header">Données</div>
                    <div class="chart-placeholder">Graphique Circulaire</div>
                </div>
                
                <!-- Widget 2: Graphique Barres -->
                <div class="card card-bars">
                    <div class="card-header">Revenus</div>
                    <div class="chart-placeholder">Histogramme</div>
                </div>

                <!-- Widget 3: Tâches / Source Mère -->
                <div class="card card-tasks">
                    <div class="card-header">Résumé des tâches</div>
                    <div class="task-list">
                        <div class="task-item">Projet : Le Lâche Prise</div>
                        <div class="task-item">Progression : 60%</div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
