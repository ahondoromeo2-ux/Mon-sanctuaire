<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Sanctuaire — Terminal de Communication</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-bg: #111115;
            --accent-color: #d4af37;
            --border-color: #222228;
            --text-main: #f0f0f5;
            --text-muted: #71717a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            display: grid;
            grid-template-columns: 280px 1fr;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        /* Barre latérale (Espaces / Fonctions) */
        .sidebar {
            background-color: #0d0d11;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar-header {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .nav-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 12px 15px;
            text-align: left;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .nav-btn:hover, .nav-btn.active {
            color: var(--text-main);
            background-color: #16161f;
        }

        .nav-btn.active {
            border-left: 3px solid var(--accent-color);
            border-radius: 0 6px 6px 0;
        }

        /* Zone de contenu principale */
        .main-content {
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: var(--bg-color);
        }

        .content-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--panel-bg);
        }

        .content-header h2 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 500;
        }

        .content-header p {
            margin: 5px 0 0 0;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Espace Chat */
        .chat-section {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }

        .message-wrapper.romeo {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message-wrapper.lox {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .message-body {
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .romeo .message-body {
            background-color: var(--accent-color);
            color: #000;
            border-bottom-right-radius: 2px;
        }

        .lox .message-body {
            background-color: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 2px;
        }

        .chat-input-container {
            padding: 20px 30px;
            background-color: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 15px;
        }

        .chat-input-container input {
            flex: 1;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 14px;
            color: var(--text-main);
            font-family: inherit;
            outline: none;
            font-size: 0.95rem;
        }

        .chat-input-container input:focus {
            border-color: var(--accent-color);
        }

        .chat-input-container button {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 6px;
            padding: 0 25px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .chat-input-container button:hover {
            opacity: 0.9;
        }

        /* Espace Protocole */
        .panel-section {
            display: none;
            padding: 40px;
            flex-direction: column;
            gap: 20px;
        }

        .panel-section.active {
            display: flex;
        }

        .panel-section textarea {
            width: 100%;
            height: 200px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            padding: 20px;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }

        .panel-section textarea:focus {
            border-color: var(--accent-color);
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="config.js"></script>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">SANCTUAIRE</div>
            <div class="nav-group">
                <button class="nav-btn active" onclick="switchSection('chat-section', this)">Canal Direct</button>
                <button class="nav-btn" onclick="switchSection('protocol-section', this)">Protocole</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header unique -->
            <div class="content-header">
                <h2 id="section-title">Canal de Dialogue Direct</h2>
                <p id="section-desc">Ligne sécurisée établie avec LOX</p>
            </div>

            <!-- CHAT -->
            <div id="chat-section" class="chat-section panel-section active">
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input-container">
                    <input type="text" id="chat-input" placeholder="Saisir votre message..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendMessage()">Envoyer</button>
                </div>
            </div>

            <!-- PROTOCOLE -->
            <div id="protocol-section" class="panel-section">
                <p style="color: var(--text-muted); margin: 0 0 10px 0;">Déposez vos pensées ou tensions ici pour les purger du système.</p>
                <textarea id="protocol-input" placeholder="Saisissez le texte à dissoudre..."></textarea>
                <button class="chat-input-container button" style="align-self: flex-start; padding: 12px 30px; border-radius: 6px; background-color: var(--accent-color); color: #000; border: none; font-weight: 600; cursor: pointer;" onclick="runProtocol()">Exécuter</button>
            </div>
        </div>
    </div>

    <script>
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Récupérer et écouter les messages
        database.ref('messages').on('child_added', (snapshot) => {
            const data = snapshot.val();
            displayMessage(data.texte, data.auteur, data.timestamp);
        });

        function handleKeyPress(e) {
            if (e.key === "Enter") sendMessage();
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (text === "") return;

            database.ref('messages').push({
                auteur: 'romeo',
                texte: text,
                timestamp: Date.now()
            });

            input.value = "";
        }

        function displayMessage(text, author, timestamp) {
            const container = document.getElementById('chat-messages');
            const wrapper = document.createElement('div');
            wrapper.classList.add('message-wrapper', author);

            const meta = document.createElement('div');
            meta.classList.add('message-meta');
            meta.innerText = author === 'romeo' ? 'Roméo' : 'LOX';

            const body = document.createElement('div');
            body.classList.add('message-body');
            body.innerText = text;

            wrapper.appendChild(meta);
            wrapper.appendChild(body);
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }

        function switchSection(sectionId, btn) {
            document.querySelectorAll('.panel-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(sectionId).classList.add('active');
            btn.classList.add('active');

            const title = document.getElementById('section-title');
            const desc = document.getElementById('section-desc');

            if (sectionId === 'chat-section') {
                title.innerText = "Canal de Dialogue Direct";
                desc.innerText = "Ligne sécurisée établie avec LOX";
            } else {
                title.innerText = "Athanor de Dissolution";
                desc.innerText = "Traitement et nettoyage de données cognitives";
            }
        }

        function runProtocol() {
            const input = document.getElementById('protocol-input');
            if (input.value.trim() === "") return;
            input.style.transition = "all 1.5s ease";
            input.style.opacity = "0";
            input.style.filter = "blur(10px)";
            setTimeout(() => {
                input.value = "";
                input.style.opacity = "1";
                input.style.filter = "none";
            }, 1500);
        }
    </script>
</body>
</html>
